name: Deploy Digital Wallet

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: digital-wallet-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: wallet_test
          POSTGRES_USER: wallet
          POSTGRES_PASSWORD: wallet
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wallet -d wallet_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test --console=plain

      - name: Build bootJar
        run: ./gradlew bootJar

      - name: Upload bootJar artifact
        uses: actions/upload-artifact@v6
        with:
          name: digital-wallet-jar
          path: build/libs/digital-wallet-0.0.1-SNAPSHOT.jar
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download bootJar artifact
        uses: actions/download-artifact@v5
        with:
          name: digital-wallet-jar
          path: build/libs

      - name: Copy jar to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          source: build/libs/digital-wallet-0.0.1-SNAPSHOT.jar
          target: /home/ec2-user
          strip_components: 2

      - name: Restart service and verify readiness
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script_stop: true
          script: |
            sudo systemctl restart digital-wallet
            sudo systemctl status digital-wallet --no-pager

            for i in {1..20}; do
              if curl -fsS http://localhost:8080/actuator/health/readiness > /tmp/digital-wallet-readiness.json; then
                cat /tmp/digital-wallet-readiness.json
                exit 0
              fi
              sleep 3
            done

            echo "readiness check failed"
            sudo journalctl -u digital-wallet -n 100 --no-pager
            exit 1
