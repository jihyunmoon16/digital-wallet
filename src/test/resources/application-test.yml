spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/wallet_test
    username: wallet
    password: wallet
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  data:
    redis:
      host: localhost
      port: 6379
      database: 1
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true
      group:
        liveness:
          include: ping
        readiness:
          include: db,redis,ping
